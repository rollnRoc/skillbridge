services:
  - type: web
    name: skillbridge-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install; npm run build:api; npx prisma generate --schema=prisma/schema.prisma
    startCommand: npx prisma migrate deploy --schema=prisma/schema.prisma; npm run start:api
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WEB_URL
        sync: false
